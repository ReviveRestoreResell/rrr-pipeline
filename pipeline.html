// Counts
function countFlow(f){
  if(f==='all') return ITEMS.length;
  if(f==='flag') return ITEMS.filter(function(i){return i.has_flag;}).length;
  if(f==='review') return ITEMS.filter(function(i){return i.has_review;}).length;
  return ITEMS.filter(function(i){return i.flow===f;}).length;
}
['all','sourcing','intake','photography','listing','published','flag','review'].forEach(function(f){
  var el=document.getElementById('cnt-'+f);
  if(el){ var n=countFlow(f); el.textContent=n; if(n===0) el.classList.add('z'); }
});

function setFlow(flow, btn){
  curFlow=flow; curSub='all';
  document.querySelectorAll('.fb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  buildSubs();
  document.getElementById('si').textContent = INFO[flow]||'';
  render();
}

function buildSubs(){
  var nav=document.getElementById('subNav');
  var subs=SUBS[curFlow]||[];
  if(!subs.length){ nav.innerHTML=''; return; }
  var fi=ITEMS.filter(function(i){return i.flow===curFlow;});
  var h='<button class="sb on" onclick="setSub(\'all\',this)">All <span class="sc">'+fi.length+'</span></button>';
  subs.forEach(function(s){
    var n=fi.filter(function(i){return i.sub===s;}).length;
    h+='<button class="sb" onclick="setSub(\''+s+'\',this)">'+s+' <span class="sc">'+n+'</span></button>';
  });
  nav.innerHTML=h;
}

function setSub(sub, btn){
  curSub=sub;
  document.querySelectorAll('.sb').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  var desc = (curFlow==='intake' && SUB_INFO[sub]) ? SUB_INFO[sub] : (INFO[curFlow]||'');
  document.getElementById('si').textContent = desc;
  render();
}

function dot(f){ return f>3?'rd':f>0?'wn':'ok'; }
function sh(s,n){ if(!s) return ''; return s.length>n?s.substring(0,n)+'...':s; }

function cardStd(i){
  var d='<div class="card" onclick="openCard(\''+i.sku+'\')">';
  d+='<div class="sd '+dot(i.flags)+'"></div>';
  d+='<div class="sku">'+i.sku+'</div>';
  d+='<div class="brd">'+(sh(i.brand,24)||'&mdash;')+'</div>';
  d+='<div class="mr">';
  d+='<span class="t cat">'+i.category+'</span>';
  if(i.condition) d+='<span class="t">'+i.condition+'</span>';
  if(i.expected && i.expected!=='—') d+='<span class="t pr">'+i.expected+'</span>';
  if(i.photos>0) d+='<span class="t ph">'+i.photos+' photos</span>';
  if(i.flags>0) d+='<span class="t fg">'+i.flags+' flag'+(i.flags>1?'s':'')+'</span>';
  if(i.has_review) d+='<span class="t re">review</span>';
  d+='</div></div>';
  return d;
}

    d+='</div>';
  }
  d+='</div>';
  return d;
}

function render(){
  var q=document.getElementById('srch').value.toLowerCase();
  var cat=document.getElementById('catF').value;
  var gw=document.getElementById('gw');
  var emp=document.getElementById('emp');

  var filtered=ITEMS.filter(function(i){
    if(curFlow==='flag'){ if(!i.has_flag) return false; }
    else if(curFlow==='review'){ if(!i.has_review) return false; }
    else if(curFlow!=='all'){
      if(i.flow!==curFlow) return false;
      if(curSub!=='all'&&i.sub!==curSub) return false;
    }
    if(cat&&i.category!==cat) return false;
    if(q&&i.sku.toLowerCase().indexOf(q)<0&&i.brand.toLowerCase().indexOf(q)<0&&i.batch.toLowerCase().indexOf(q)<0) return false;
    return true;
  });

  document.getElementById('cl').textContent=filtered.length+' item'+(filtered.length!==1?'s':'');
  if(!filtered.length){ gw.innerHTML=''; emp.style.display='block'; return; }
  emp.style.display='none';

  var useCC=(curSub==='Photo Intake'||curSub==='Card Complete');
  var useIs=(curFlow==='flag'||curFlow==='review');
  var gc=useIs?'grid-is':useCC?'grid-cc':'grid';
  var html='<div class="'+gc+'">';
  filtered.forEach(function(i){
    html+=useIs?cardIssue(i,curFlow):useCC?cardCC(i):cardStd(i);
  });
  html+='</div>';
  gw.innerHTML=html;
}

function openCard(sku){ window.open('items/'+sku+'.html','_blank'); }

buildSubs();
document.getElementById('si').textContent=INFO['all'];
render();
</script>
